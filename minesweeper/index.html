<!doctype html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Phaser Game</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        #phaser-example {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: auto;      /* behält Seitenverhältnis */
            height: auto;     /* behält Seitenverhältnis */
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div id="phaser-example"></div>

    <!-- Phaser laden -->
    <script crossorigin src="https://christoph-blank.github.io/games/minesweeper/minesweeper_pic/phaser.min.js"></script>

    <!-- Deine Haupt-JavaScript-Datei laden -->
    <script type="module" src="./main.js"></script>

    <!-- Optional: Touch-Scrolling verhindern -->
    <script>
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
